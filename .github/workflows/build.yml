name: Build SolidSkin AML Mod

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build
        run: |
          $ANDROID_NDK_ROOT/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk

      - name: Verifikasi
        run: |
          ls -lh libs/arm64-v8a/
          file libs/arm64-v8a/libsolidskin.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm \
            -D libs/arm64-v8a/libsolidskin.so | grep " T "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsolidskin-arm64
          path: libs/arm64-v8a/libsolidskin.so
          retention-days: 14
